apiVersion: v1
kind: ConfigMap
metadata:
  name: voting-app-config
data:
  # Voting options
  OPTION_A: "Cats"
  OPTION_B: "Dogs"
  
  # Service endpoints (within cluster)
  REDIS_HOST: "redis-service"
  POSTGRES_HOST: "postgres-service-headless"
  
  # Ports
  VOTE_PORT: "5000"
  RESULT_PORT: "4000"
