apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Overlay = reuse everything from ../../base, then apply env-specific changes.
# ../../base is not duplicating files; it imports the whole base kustomization.
namespace: test

resources:
  # Pull in all shared app resources defined by k8s/base/kustomization.yaml.
  - ../../base
  # Add the Namespace object itself so the test namespace exists in the cluster.
  - ../../base/namespaces/namespace-test.yaml
